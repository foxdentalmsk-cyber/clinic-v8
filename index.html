<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Система клиники v9.3</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

/* 🔥 ГЛАВНЫЙ ФИКС ГОРИЗОНТАЛЬНОГО СКРОЛЛА */
html, body{
  overflow-x:hidden;
  max-width:100vw;
}

:root{
  --bg:#f5f1ee;
  --bg-soft:#fff;
  --text:#2b2b2b;
  --muted:#666;
  --line:#e6dfda;
  --tab:#e7e1dd;
  --tab-active:#111;
  --tab-active-text:#fff;
  --card-shadow:0 12px 40px rgba(0,0,0,.08);
  --panel-shadow:0 8px 30px rgba(0,0,0,.05);

  --alexey-accent:#72b2ff;
}

/* ===== BODY ===== */
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:.25s;
}

.hidden{display:none!important}

/* ===== APP ===== */
#app{
  min-height:100vh;
  display:none;
  padding:10px 10px 78px;
}

/* ===== CHAT ===== */
.chat-wrap{
  background:rgba(255,255,255,.8);
  border:1px solid var(--line);
  border-radius:20px;
  padding:12px;
  height:58vh;
  overflow:auto;
}

/* 🔥 ВАЖНО: защита от вылета эффектов */
.msg{
  max-width:78%;
  padding:12px;
  border-radius:20px;
  position:relative;
  overflow:hidden; /* КЛЮЧЕВОЕ */
}

/* ===== АЛЕКСЕЙ — облегченный неон (без лагов) ===== */
.msg.user-alexey{
  background:linear-gradient(180deg,#141b29,#0f1420);
  color:#eef4ff;
  border:1px solid rgba(114,178,255,.35);
  box-shadow:0 0 10px rgba(114,178,255,.2);
}

/* убрали тяжелые spark/bolt → заменили на легкий эффект */
.msg.user-alexey::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(120deg,
      transparent 0%,
      rgba(114,178,255,.15) 40%,
      transparent 70%);
  opacity:.25;
  animation:alexeyLight 4s infinite;
}

@keyframes alexeyLight{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

/* ===== АННА — норм облака (без уродства) ===== */
.msg.user-anna{
  background:linear-gradient(180deg,#fff5f8,#ffe7f0);
  border:1px solid rgba(242,169,194,.2);
}

/* убрали сложные структуры → делаем мягкий слой */
.msg.user-anna::before{
  content:"";
  position:absolute;
  top:-10px;
  left:10px;
  right:10px;
  height:20px;
  background:
    radial-gradient(circle at 20% 50%, #fff 0 40%, transparent 60%),
    radial-gradient(circle at 50% 50%, #fff 0 40%, transparent 60%),
    radial-gradient(circle at 80% 50%, #fff 0 40%, transparent 60%);
  opacity:.6;
}

/* ===== НАТАЛИЯ — чистые пузыри ===== */
.msg.user-natalia{
  background:linear-gradient(180deg,#f4f9ff,#e4efff);
  border:1px solid rgba(149,185,235,.25);
}

.msg.user-natalia::before{
  content:"";
  position:absolute;
  top:-16px;
  left:0;
  right:0;
  height:30px;
  background:
    radial-gradient(circle, rgba(255,255,255,.8) 0 30%, transparent 60%) 20% 0/20px 20px no-repeat,
    radial-gradient(circle, rgba(255,255,255,.7) 0 30%, transparent 60%) 60% 0/16px 16px no-repeat;
  opacity:.6;
}

/* ===== INPUT ===== */
.input-wrap{
  display:flex;
  gap:8px;
  margin-top:8px;
}

.input-wrap input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
}

.send-btn{
  padding:0 16px;
  border:none;
  border-radius:12px;
  background:#111;
  color:#fff;
  cursor:pointer;
}

/* ===== MOBILE ===== */
@media (max-width:600px){
  .msg{
    max-width:85%;
  }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Вход</h2>

    <button onclick="loginAs('anna')">Анна</button>
    <button onclick="loginAs('natalia')">Наталия</button>
    <button onclick="loginAs('alexey')">Алексей</button>
    <button onclick="loginAs('mikhail')">Михаил</button>
    <button onclick="loginAs('doctor')">Дарья</button>

    <button onclick="openSettings()">Настройки</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <b id="userName"></b>
    <button onclick="logout()">Выйти</button>
  </div>

  <!-- CHAT -->
  <div id="chatSection">

    <div id="chatWrap" class="chat-wrap"></div>

    <div class="input-wrap">
      <input id="msgInput" placeholder="Сообщение"/>
      <button class="send-btn" onclick="sendMessage()">Отправить</button>
    </div>

    <div id="statusLine" style="font-size:12px;margin-top:6px;"></div>

  </div>

</div>

<!-- SETTINGS -->
<div id="settingsModal" style="display:none;">
  <input id="supabaseUrl" placeholder="URL"/>
  <input id="supabaseKey" placeholder="KEY"/>
  <button onclick="saveSettings()">Сохранить</button>
</div>

<script>

/* ===== USERS ===== */
const USERS = {
  anna:     { label:"Анна",     className:"user-anna",    canChat:true },
  natalia:  { label:"Наталия",  className:"user-natalia", canChat:true },
  alexey:   { label:"Алексей",  className:"user-alexey",  canChat:true },
  mikhail:  { label:"Михаил",   className:"user-mikhail", canChat:false },
  doctor:   { label:"Дарья",    className:"user-doctor",  canChat:false }
};

let currentUser = null;
let sb = null;
let channel = null;

/* 🔥 новое — локальный кэш + антидубли */
let messageIds = new Set();

/* ===== UTILS ===== */
function $(id){return document.getElementById(id);}

/* ===== SETTINGS ===== */
function openSettings(){
  $("settingsModal").style.display="block";
}

function saveSettings(){
  localStorage.setItem("url",$("supabaseUrl").value);
  localStorage.setItem("key",$("supabaseKey").value);
  $("settingsModal").style.display="none";
}

/* ===== LOGIN ===== */
function loginAs(key){
  currentUser = USERS[key];

  $("login").style.display="none";
  $("app").style.display="block";

  $("userName").textContent = currentUser.label;

  reconnect();
}

function logout(){
  if(channel) sb.removeChannel(channel);
  currentUser=null;
  $("login").style.display="flex";
  $("app").style.display="none";
}

/* ===== CLIENT ===== */
function createClient(){
  return supabase.createClient(
    localStorage.getItem("url"),
    localStorage.getItem("key")
  );
}

/* ===== CONNECT ===== */
async function reconnect(){
  try{
    $("statusLine").textContent="Подключение...";

    if(channel && sb){
      await sb.removeChannel(channel);
    }

    sb = createClient();

    await loadMessages();
    startRealtime();

    $("statusLine").textContent="Онлайн";

  }catch(e){
    $("statusLine").textContent="Ошибка";
    console.error(e);
  }
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatTime(iso){
  if(!iso) return "";
  const d = new Date(iso);
  if(Number.isNaN(d.getTime())) return "";
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

/* ===== RENDER ONE MESSAGE ===== */
function appendMessage(row, toTop = false){
  if(!row || !row.id) return;
  if(messageIds.has(row.id)) return;

  messageIds.add(row.id);

  const wrap = $("chatWrap");
  const mine = currentUser && row.user === currentUser.label;

  const userClass =
    row.user === "Анна" ? "user-anna" :
    row.user === "Наталия" ? "user-natalia" :
    row.user === "Алексей" ? "user-alexey" :
    row.user === "Михаил" ? "user-mikhail" :
    "user-doctor";

  const rowEl = document.createElement("div");
  rowEl.className = `msg-row ${mine ? "mine" : "other"}`;
  rowEl.style.display = "flex";
  rowEl.style.justifyContent = mine ? "flex-end" : "flex-start";
  rowEl.style.margin = "10px 0";

  const msgEl = document.createElement("div");
  msgEl.className = `msg ${userClass}`;
  msgEl.innerHTML = `
    <div style="font-size:12px;font-weight:700;margin-bottom:4px;">${escapeHtml(row.user || "")}</div>
    <div style="font-size:14px;line-height:1.4;">${escapeHtml(row.text || "")}</div>
    <div style="font-size:11px;opacity:.7;text-align:right;margin-top:4px;">${formatTime(row.created_at)}</div>
  `;

  rowEl.appendChild(msgEl);

  if(toTop && wrap.firstChild){
    wrap.insertBefore(rowEl, wrap.firstChild);
  }else{
    wrap.appendChild(rowEl);
    wrap.scrollTop = wrap.scrollHeight;
  }
}

/* ===== FULL LOAD ONLY ON START ===== */
async function loadMessages(){
  const { data, error } = await sb
    .from("messages")
    .select("*")
    .order("id", { ascending: true })
    .limit(300);

  if(error) throw error;

  $("chatWrap").innerHTML = "";
  messageIds.clear();

  (data || []).forEach(row => appendMessage(row));
}

/* ===== REALTIME — БЕЗ ПОЛНОЙ ПЕРЕЗАГРУЗКИ ===== */
function startRealtime(){
  channel = sb
    .channel("messages-live-v93")
    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "messages"
      },
      payload => {
        if(payload && payload.new){
          appendMessage(payload.new);
        }
      }
    )
    .subscribe(status => {
      if(status === "SUBSCRIBED"){
        $("statusLine").textContent = "Онлайн";
      }
      if(status === "CHANNEL_ERROR"){
        $("statusLine").textContent = "Ошибка realtime";
      }
      if(status === "TIMED_OUT"){
        $("statusLine").textContent = "Таймаут, переподключение...";
        setTimeout(() => reconnect(), 1200);
      }
      if(status === "CLOSED"){
        $("statusLine").textContent = "Соединение закрыто, переподключение...";
        setTimeout(() => reconnect(), 1200);
      }
    });
}

/* ===== SEND ===== */
async function sendMessage(){
  if(!currentUser || !currentUser.canChat) return;

  const input = $("msgInput");
  const text = input.value.trim();
  if(!text) return;
  if(!sb){
    $("statusLine").textContent = "Нет подключения";
    return;
  }

  const sendBtn = document.querySelector(".send-btn");
  if(sendBtn) sendBtn.disabled = true;

  try{
    const { error } = await sb
      .from("messages")
      .insert({
        user: currentUser.label,
        text: text
      });

    if(error) throw error;

    input.value = "";
    $("statusLine").textContent = "Отправлено";
  }catch(e){
    console.error(e);
    $("statusLine").textContent = "Ошибка отправки";
  }finally{
    if(sendBtn) sendBtn.disabled = false;
  }
}

/* ===== ENTER TO SEND ===== */
document.addEventListener("DOMContentLoaded", () => {
  $("msgInput").addEventListener("keydown", e => {
    if(e.key === "Enter"){
      e.preventDefault();
      sendMessage();
    }
  });
});

/* ===== MOBILE / NETWORK STABILITY ===== */

let reconnectTimer = null;
let reconnectAttempts = 0;
let manualReconnect = false;

function clearReconnectTimer(){
  if(reconnectTimer){
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
}

function scheduleReconnect(reason = ""){
  clearReconnectTimer();

  const delay = Math.min(1200 + reconnectAttempts * 1800, 8000);
  reconnectAttempts++;

  $("statusLine").textContent = reason
    ? `${reason} Переподключение...`
    : "Переподключение...";

  reconnectTimer = setTimeout(async () => {
    try{
      await reconnect(true);
    }catch(e){
      console.error("Reconnect failed:", e);
      scheduleReconnect("Сеть нестабильна.");
    }
  }, delay);
}

window.addEventListener("online", () => {
  $("statusLine").textContent = "Сеть восстановлена. Подключение...";
  reconnectAttempts = 0;
  scheduleReconnect();
});

window.addEventListener("offline", () => {
  clearReconnectTimer();
  $("statusLine").textContent = "Нет интернета";
});

document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible" && currentUser){
    scheduleReconnect("Возврат в приложение.");
  }
});

/* ===== SAFE RECONNECT ===== */
async function reconnect(fromAuto = false){
  try{
    clearReconnectTimer();

    if(!fromAuto){
      manualReconnect = true;
      $("statusLine").textContent = "Переподключение...";
    }

    if(channel && sb){
      try{
        await sb.removeChannel(channel);
      }catch(e){
        console.warn("removeChannel error:", e);
      }
      channel = null;
    }

    sb = createClient();

    /* мягкая проверка соединения */
    const { error: pingError } = await sb
      .from("messages")
      .select("id")
      .limit(1);

    if(pingError) throw pingError;

    reconnectAttempts = 0;

    if(currentUser && currentUser.canChat){
      await loadMessages();
      startRealtime();
    }else{
      $("chatWrap").innerHTML = `<div style="font-size:13px;color:#777;text-align:center;padding:20px;">Чат отключен</div>`;
      $("statusLine").textContent = "Чат недоступен";
    }

    if(!fromAuto || manualReconnect){
      $("statusLine").textContent = "Онлайн";
    }

    manualReconnect = false;
  }catch(e){
    console.error("Reconnect error:", e);
    $("statusLine").textContent = "Ошибка соединения";
    scheduleReconnect("Ошибка соединения.");
  }
}

/* ===== MANUAL BUTTON SUPPORT ===== */
function reconnectNow(){
  reconnectAttempts = 0;
  reconnect(false);
}

/* ===== EXTRA SAFETY: PERIODIC HEALTHCHECK ===== */
setInterval(async () => {
  if(!currentUser || !sb || navigator.onLine === false) return;

  try{
    const { error } = await sb
      .from("messages")
      .select("id")
      .limit(1);

    if(error){
      throw error;
    }
  }catch(e){
    console.warn("Healthcheck failed:", e);
    scheduleReconnect("Потеря связи.");
  }
}, 25000);

/* ===== UX мелочи ===== */

/* автоскролл только если пользователь внизу */
function isNearBottom(){
  const wrap = $("chatWrap");
  return wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 120;
}

function smartScroll(){
  const wrap = $("chatWrap");
  if(isNearBottom()){
    wrap.scrollTop = wrap.scrollHeight;
  }
}

/* переопределяем append с учетом UX */
const originalAppend = appendMessage;
appendMessage = function(row, toTop = false){
  const shouldScroll = isNearBottom();
  originalAppend(row, toTop);

  if(shouldScroll){
    setTimeout(() => smartScroll(), 10);
  }
};

/* клики вне модалок */
document.addEventListener("click", (e)=>{
  if(e.target.id === "settingsModal"){
    $("settingsModal").style.display = "none";
  }
});

/* escape */
document.addEventListener("keydown",(e)=>{
  if(e.key === "Escape"){
    $("settingsModal").style.display = "none";
  }
});

/* защита от пустых настроек */
(function init(){
  const url = localStorage.getItem("url");
  const key = localStorage.getItem("key");

  if(!url || !key){
    setTimeout(()=>{
      alert("Сначала открой настройки и вставь Supabase URL + KEY");
    },300);
  }
})();

</script>
</body>
</html>
