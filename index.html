<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Система клиники v9.2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
:root{
  --bg:#f5f1ee;
  --bg-soft:#fff;
  --text:#2b2b2b;
  --muted:#666;
  --line:#e6dfda;
  --tab:#e7e1dd;
  --tab-active:#111;
  --tab-active-text:#fff;
  --card-shadow:0 12px 40px rgba(0,0,0,.08);
  --panel-shadow:0 8px 30px rgba(0,0,0,.05);

  --anna-1:#fff5f8;
  --anna-2:#ffe7f0;
  --anna-3:#f2a9c2;
  --anna-cloud-a:#fff8fb;
  --anna-cloud-b:#ffeaf3;
  --anna-cloud-c:#ffd9e8;
  --anna-cloud-shadow:rgba(242,169,194,.24);

  --natalia-1:#f4f9ff;
  --natalia-2:#e4efff;
  --natalia-3:#95b9eb;
  --natalia-bubble-a:#ffffff;
  --natalia-bubble-b:#edf7ff;
  --natalia-bubble-line:rgba(149,185,235,.42);
  --natalia-bubble-shadow:rgba(149,185,235,.22);

  --alexey-1:#0f1420;
  --alexey-2:#141b29;
  --alexey-3:#223049;
  --alexey-4:#d9e6ff;
  --alexey-accent:#72b2ff;
  --alexey-accent-2:#9fd2ff;
  --alexey-accent-soft:rgba(114,178,255,.14);
  --alexey-accent-mid:rgba(114,178,255,.28);
  --alexey-accent-strong:rgba(114,178,255,.54);

  --doctor-1:#f6f8fa;
  --doctor-2:#e8edf2;
  --doctor-3:#aebdca;

  --mikhail-1:#f7f4ff;
  --mikhail-2:#ece5ff;
  --mikhail-3:#b3a4ef;

  --success:#dff2e5;
  --success-text:#2f6f46;
  --warn:#f7eadb;
  --warn-text:#7a5833;
  --progress:#e8e7f8;
  --progress-text:#514a8c;
}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:background .28s ease,color .28s ease;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 15%, rgba(255,255,255,.55), transparent 26%),
    radial-gradient(circle at 80% 10%, rgba(255,255,255,.32), transparent 24%),
    radial-gradient(circle at 50% 85%, rgba(255,255,255,.22), transparent 28%);
  opacity:.9;
}
.hidden{display:none!important}

/* THEMES */
body.role-admin-anna{
  --bg:#f8f2f4;
  --bg-soft:#fffdfd;
  --text:#47343d;
  --muted:#7d6771;
  --line:#f0d8e2;
  --tab:#f7e4eb;
  --tab-active:#d784a3;
  --tab-active-text:#fff;
  --panel-shadow:0 14px 35px rgba(215,132,163,.12);
}
body.role-admin-anna::before{
  background:
    radial-gradient(circle at 15% 14%, rgba(255,221,235,.85), transparent 20%),
    radial-gradient(circle at 78% 16%, rgba(255,244,249,.95), transparent 24%),
    radial-gradient(circle at 52% 88%, rgba(255,229,240,.55), transparent 25%);
}

body.role-admin-natalia{
  --bg:#f2f7fc;
  --bg-soft:#fcfeff;
  --text:#304254;
  --muted:#687b90;
  --line:#dbe7f4;
  --tab:#e3eef9;
  --tab-active:#7ea5d7;
  --tab-active-text:#fff;
  --panel-shadow:0 14px 35px rgba(126,165,215,.14);
}
body.role-admin-natalia::before{
  background:
    radial-gradient(circle at 18% 15%, rgba(221,236,255,.78), transparent 22%),
    radial-gradient(circle at 82% 10%, rgba(243,249,255,.92), transparent 23%),
    radial-gradient(circle at 50% 88%, rgba(212,230,251,.46), transparent 28%);
}

body.role-manager{
  --bg:#0f1116;
  --bg-soft:#151923;
  --text:#e7edf7;
  --muted:#95a3b8;
  --line:#242a35;
  --tab:#1a2029;
  --tab-active:#2a3547;
  --tab-active-text:#e7edf7;
  --panel-shadow:0 16px 44px rgba(0,0,0,.34);
}
body.role-manager::before{
  background:
    radial-gradient(circle at 18% 12%, rgba(72,107,161,.22), transparent 24%),
    radial-gradient(circle at 78% 12%, rgba(255,255,255,.05), transparent 22%),
    radial-gradient(circle at 50% 86%, rgba(75,120,190,.14), transparent 30%);
  opacity:1;
}

body.role-chief{
  --bg:#f5f2fb;
  --bg-soft:#fff;
  --text:#3f3752;
  --muted:#756b88;
  --line:#e6ddf4;
  --tab:#efe8fa;
  --tab-active:#7a67b3;
  --tab-active-text:#fff;
  --panel-shadow:0 14px 38px rgba(122,103,179,.12);
}

body.role-doctor{
  --bg:#eef3f6;
  --bg-soft:#fbfdff;
  --text:#2f3c47;
  --muted:#667785;
  --line:#dce5eb;
  --tab:#e4ebf0;
  --tab-active:#7f94a3;
  --tab-active-text:#fff;
  --panel-shadow:0 14px 38px rgba(98,120,137,.10);
}

/* LOGIN */
#login{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  z-index:1;
}
.card{
  width:360px;
  background:var(--bg-soft);
  padding:20px;
  border-radius:24px;
  border:1px solid var(--line);
  box-shadow:var(--card-shadow);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:"";
  position:absolute;
  inset:0 auto auto 0;
  width:100%;
  height:120px;
  background:linear-gradient(180deg, rgba(255,255,255,.55), transparent);
  pointer-events:none;
}
.card h2{margin:0 0 14px;font-size:24px;position:relative;z-index:1}
.card p{margin:0 0 12px;color:var(--muted);font-size:14px;line-height:1.45;position:relative;z-index:1}
.card button{
  width:100%;
  margin-top:8px;
  padding:12px 14px;
  border:none;
  border-radius:14px;
  background:#ececec;
  cursor:pointer;
  font-size:15px;
  transition:transform .16s ease,background .16s ease,box-shadow .16s ease;
  position:relative;
  z-index:1;
}
.card button:hover{transform:translateY(-1px)}
.card button:active{transform:translateY(0)}
.small-btn{
  background:#111!important;
  color:#fff!important;
}
.note{
  margin-top:12px;
  font-size:12px;
  color:var(--muted);
  line-height:1.45;
  position:relative;
  z-index:1;
}
.error-box{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  background:#fff1f1;
  color:#9b2226;
  font-size:13px;
  line-height:1.45;
  display:none;
  white-space:pre-wrap;
  position:relative;
  z-index:1;
}

/* APP SHELL */
#app{
  min-height:100vh;
  display:none;
  padding:10px 10px 78px;
  position:relative;
  z-index:1;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.title{
  font-size:18px;
  font-weight:800;
  letter-spacing:.02em;
}
.top-right{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.user-name{
  font-weight:800;
}
.top-btn{
  padding:10px 12px;
  border:none;
  border-radius:12px;
  background:#111;
  color:#fff;
  cursor:pointer;
  font-size:13px;
  transition:transform .16s ease, opacity .16s ease, box-shadow .16s ease;
}
.top-btn:hover{transform:translateY(-1px)}
.top-btn.light{
  background:rgba(255,255,255,.6);
  color:var(--text);
  border:1px solid var(--line);
  backdrop-filter:blur(10px);
}
body.role-manager .top-btn{
  background:linear-gradient(180deg, #2a3342, #1a2029);
  border:1px solid #303a49;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
}
body.role-manager .top-btn.light{
  background:rgba(255,255,255,.04);
  color:var(--text);
  border:1px solid #2a313d;
}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:10px;
  flex-wrap:wrap;
}
.tab-btn{
  border:none;
  border-radius:14px;
  padding:10px 14px;
  background:var(--tab);
  color:var(--text);
  cursor:pointer;
  font-size:14px;
  font-weight:700;
  transition:transform .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease;
}
.tab-btn:hover{transform:translateY(-1px)}
.tab-btn.active{
  background:var(--tab-active);
  color:var(--tab-active-text);
  box-shadow:0 10px 24px rgba(0,0,0,.08);
}

.section{display:none}
.section.active{
  display:block;
  animation:fadeSection .24s ease;
}
@keyframes fadeSection{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

/* CHAT */
.chat-shell{
  position:relative;
}
.chat-wrap{
  background:rgba(255,255,255,.72);
  border:1px solid var(--line);
  border-radius:22px;
  padding:12px;
  height:58vh;
  overflow:auto;
  box-shadow:var(--panel-shadow);
  backdrop-filter:blur(12px);
}
body.role-manager .chat-wrap{
  background:rgba(21,25,35,.90);
  border-color:#242b38;
  box-shadow:0 18px 40px rgba(0,0,0,.35);
}
.day-label{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  margin:4px 0 10px;
}
.msg-row{
  display:flex;
  margin:12px 0;
  animation:msgIn .24s ease;
}
.msg-row.mine{justify-content:flex-end}
.msg-row.other{justify-content:flex-start}
@keyframes msgIn{
  from{opacity:0;transform:translateY(8px) scale(.985)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.msg{
  max-width:min(78%,720px);
  min-width:92px;
  padding:12px 14px;
  border-radius:22px;
  line-height:1.38;
  word-break:break-word;
  box-shadow:0 6px 18px rgba(0,0,0,.06);
  position:relative;
  transition:transform .16s ease, box-shadow .16s ease;
  overflow:visible;
  isolation:isolate;
}
.msg:hover{
  transform:translateY(-1px);
  box-shadow:0 10px 24px rgba(0,0,0,.10);
}
.msg.sending{opacity:.72}
.msg-head{
  font-size:12px;
  font-weight:800;
  margin-bottom:4px;
}
.msg-text{
  font-size:14px;
}
.msg-meta{
  margin-top:5px;
  font-size:11px;
  opacity:.75;
  text-align:right;
}
/* ===== АЛЕКСЕЙ — ЯВНЫЙ НЕОН / ДУГИ / ВСПЫШКИ ===== */
.msg.user-alexey{
  background:
    radial-gradient(circle at 20% 20%, rgba(114,178,255,.08), transparent 42%),
    linear-gradient(180deg, rgba(24,32,47,.98), rgba(12,18,28,.98));
  color:#eef4ff;
  border:1px solid rgba(114,178,255,.30);
  box-shadow:
    0 10px 26px rgba(0,0,0,.34),
    inset 0 0 22px rgba(114,178,255,.08),
    0 0 16px rgba(114,178,255,.12);
  text-shadow:
    0 0 10px rgba(114,178,255,.18),
    0 0 20px rgba(114,178,255,.08);
}
.msg.mine.user-alexey{border-radius:22px 22px 10px 22px}
.msg.other.user-alexey{border-radius:22px 22px 22px 10px}

.msg.user-alexey .fx-electric{
  position:absolute;
  inset:-2px;
  pointer-events:none;
  overflow:visible;
}

.msg.user-alexey .fx-electric .edge-glow{
  position:absolute;
  inset:0;
  border-radius:inherit;
  box-shadow:
    0 0 0 1px rgba(114,178,255,.24),
    0 0 14px rgba(114,178,255,.16),
    0 0 28px rgba(114,178,255,.10);
  opacity:.9;
}

.msg.user-alexey .fx-electric .flash{
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:
    linear-gradient(115deg,
      transparent 0 24%,
      rgba(114,178,255,.00) 34%,
      rgba(114,178,255,.20) 44%,
      rgba(255,255,255,.34) 49%,
      rgba(114,178,255,.18) 55%,
      transparent 66% 100%);
  opacity:0;
  mix-blend-mode:screen;
  animation:alexeyFlash 5.8s infinite ease-in-out;
}

.msg.user-alexey .fx-electric .spark{
  position:absolute;
  top:-5px;
  width:26px;
  height:10px;
  border-top:2px solid rgba(159,210,255,.96);
  border-radius:14px 14px 0 0;
  filter:
    drop-shadow(0 0 4px rgba(114,178,255,.85))
    drop-shadow(0 0 8px rgba(114,178,255,.50));
  opacity:0;
}
.msg.user-alexey .fx-electric .spark.s1{
  left:8%;
  animation:alexeySpark1 4.8s infinite ease-in-out;
}
.msg.user-alexey .fx-electric .spark.s2{
  left:44%;
  width:32px;
  animation:alexeySpark2 5.6s 1.2s infinite ease-in-out;
}
.msg.user-alexey .fx-electric .spark.s3{
  left:76%;
  width:20px;
  animation:alexeySpark3 4.9s 2.3s infinite ease-in-out;
}

.msg.user-alexey .fx-electric .bolt{
  position:absolute;
  right:8px;
  top:10px;
  width:18px;
  height:34px;
  opacity:0;
  transform:skewX(-8deg);
  background:
    polygon;
  clip-path:polygon(47% 0, 74% 0, 56% 34%, 82% 34%, 28% 100%, 42% 58%, 20% 58%);
  background:linear-gradient(180deg, rgba(220,240,255,.98), rgba(114,178,255,.92));
  filter:
    drop-shadow(0 0 6px rgba(114,178,255,.85))
    drop-shadow(0 0 14px rgba(114,178,255,.42));
  animation:alexeyBolt 7.2s 1.8s infinite ease-in-out;
}

.msg.user-alexey .fx-electric .pulse{
  position:absolute;
  inset:0;
  border-radius:inherit;
  background:
    radial-gradient(circle at 22% 50%, rgba(114,178,255,.20), transparent 30%),
    radial-gradient(circle at 78% 38%, rgba(114,178,255,.12), transparent 24%);
  opacity:.16;
  animation:alexeyPulse 3.8s infinite ease-in-out;
}

@keyframes alexeyFlash{
  0%,100%{opacity:0;transform:translateX(-12%)}
  34%{opacity:0}
  40%{opacity:.14}
  44%{opacity:.34}
  49%{opacity:.12}
  58%{opacity:0;transform:translateX(10%)}
}
@keyframes alexeySpark1{
  0%,100%{opacity:0;transform:translateX(-10px) scaleX(.7)}
  10%{opacity:0}
  17%{opacity:1;transform:translateX(8px) scaleX(1)}
  24%{opacity:.10;transform:translateX(18px) scaleX(.85)}
  32%{opacity:0}
}
@keyframes alexeySpark2{
  0%,100%{opacity:0;transform:translateX(-8px) scaleX(.8)}
  24%{opacity:0}
  31%{opacity:.95;transform:translateX(10px) scaleX(1.02)}
  38%{opacity:.12;transform:translateX(22px) scaleX(.88)}
  46%{opacity:0}
}
@keyframes alexeySpark3{
  0%,100%{opacity:0;transform:translateX(-7px) scaleX(.75)}
  48%{opacity:0}
  56%{opacity:.92;transform:translateX(8px) scaleX(1)}
  63%{opacity:.10;transform:translateX(16px) scaleX(.84)}
  70%{opacity:0}
}
@keyframes alexeyBolt{
  0%,100%{opacity:0;transform:translateY(-6px) scale(.8)}
  58%{opacity:0}
  64%{opacity:.94;transform:translateY(0) scale(1)}
  68%{opacity:.24}
  72%{opacity:0}
}
@keyframes alexeyPulse{
  0%,100%{opacity:.08}
  50%{opacity:.24}
}

/* ===== АННА — КРАСИВЫЕ ОБЛАЧНЫЕ КЛАСТЕРЫ, КОТОРЫЕ СНОСИТ ВЕТРОМ ===== */
.msg.user-anna{
  background:linear-gradient(180deg, var(--anna-1), var(--anna-2));
  color:#5c3b4b;
  border:1px solid rgba(242,169,194,.22);
  box-shadow:
    0 8px 22px rgba(242,169,194,.18),
    0 0 0 1px rgba(255,255,255,.24) inset;
}
.msg.mine.user-anna{border-radius:26px 26px 12px 26px}
.msg.other.user-anna{border-radius:26px 26px 26px 12px}

.msg.user-anna .fx-cloudline{
  position:absolute;
  left:8px;
  right:8px;
  top:-16px;
  height:30px;
  pointer-events:none;
  overflow:visible;
}

.msg.user-anna .fx-cloudline .cloud{
  position:absolute;
  width:34px;
  height:18px;
  opacity:.95;
  filter:
    drop-shadow(0 2px 6px var(--anna-cloud-shadow))
    drop-shadow(0 0 8px rgba(255,235,244,.28));
}
.msg.user-anna .fx-cloudline .cloud::before,
.msg.user-anna .fx-cloudline .cloud::after,
.msg.user-anna .fx-cloudline .cloud i{
  content:"";
  position:absolute;
  display:block;
  border-radius:999px;
  background:
    radial-gradient(circle at 32% 32%, var(--anna-cloud-a), var(--anna-cloud-b) 56%, var(--anna-cloud-c));
  box-shadow:inset 0 0 4px rgba(255,255,255,.36);
}
.msg.user-anna .fx-cloudline .cloud::before{
  left:0; bottom:0;
  width:18px; height:14px;
}
.msg.user-anna .fx-cloudline .cloud::after{
  left:10px; bottom:2px;
  width:16px; height:16px;
}
.msg.user-anna .fx-cloudline .cloud i{
  left:18px; bottom:0;
  width:14px; height:12px;
}

.msg.user-anna .fx-cloudline .c1{left:-2%; top:6px; animation:annaWind1 7.2s infinite ease-in-out;}
.msg.user-anna .fx-cloudline .c2{left:20%; top:2px; transform:scale(.92); animation:annaWind2 7.8s .8s infinite ease-in-out;}
.msg.user-anna .fx-cloudline .c3{left:44%; top:6px; transform:scale(1.04); animation:annaWind3 7.0s 1.6s infinite ease-in-out;}
.msg.user-anna .fx-cloudline .c4{left:70%; top:1px; transform:scale(.88); animation:annaWind4 7.6s 2.3s infinite ease-in-out;}

@keyframes annaWind1{
  0%,100%{transform:translate(0,0) scale(1);opacity:.26}
  14%{opacity:.96}
  52%{transform:translate(18px,-2px) scale(1.04)}
  82%{transform:translate(42px,-10px) scale(1.14);opacity:.30}
}
@keyframes annaWind2{
  0%,100%{transform:translate(0,0) scale(.92);opacity:.20}
  16%{opacity:.90}
  54%{transform:translate(20px,-3px) scale(.98)}
  84%{transform:translate(48px,-12px) scale(1.10);opacity:.28}
}
@keyframes annaWind3{
  0%,100%{transform:translate(0,0) scale(1.04);opacity:.22}
  12%{opacity:.92}
  50%{transform:translate(16px,-2px) scale(1.08)}
  80%{transform:translate(40px,-10px) scale(1.18);opacity:.26}
}
@keyframes annaWind4{
  0%,100%{transform:translate(0,0) scale(.88);opacity:.20}
  18%{opacity:.88}
  56%{transform:translate(18px,-3px) scale(.96)}
  86%{transform:translate(46px,-11px) scale(1.08);opacity:.24}
}
/* ===== НАТАЛИЯ — ПУЗЫРЬКИ ДАЛЬШЕ ОТ СООБЩЕНИЯ ===== */
.msg.user-natalia{
  background:linear-gradient(180deg, var(--natalia-1), var(--natalia-2));
  color:#35506e;
  border:1px solid rgba(149,185,235,.26);
  box-shadow:
    0 8px 22px rgba(149,185,235,.17),
    0 0 0 1px rgba(255,255,255,.26) inset;
}
.msg.mine.user-natalia{border-radius:22px 22px 12px 22px}
.msg.other.user-natalia{border-radius:22px 22px 22px 12px}

.msg.user-natalia .fx-bubbleline{
  position:absolute;
  left:6px;
  right:6px;
  top:-20px;
  height:42px;
  pointer-events:none;
  overflow:visible;
}
.msg.user-natalia .fx-bubbleline span{
  position:absolute;
  bottom:2px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, var(--natalia-bubble-a), var(--natalia-bubble-b) 58%, rgba(255,255,255,.18));
  border:1px solid var(--natalia-bubble-line);
  box-shadow:
    0 0 12px var(--natalia-bubble-shadow),
    inset 0 0 7px rgba(255,255,255,.34);
  opacity:.96;
}
.msg.user-natalia .fx-bubbleline .b1{left:2%; width:11px; height:11px; animation:nBubble1 5.2s infinite ease-in-out;}
.msg.user-natalia .fx-bubbleline .b2{left:24%; width:8px; height:8px; animation:nBubble2 5.8s .8s infinite ease-in-out;}
.msg.user-natalia .fx-bubbleline .b3{left:46%; width:13px; height:13px; animation:nBubble3 5.4s 1.6s infinite ease-in-out;}
.msg.user-natalia .fx-bubbleline .b4{left:68%; width:9px; height:9px; animation:nBubble4 6s 2.1s infinite ease-in-out;}
.msg.user-natalia .fx-bubbleline .b5{left:88%; width:10px; height:10px; animation:nBubble5 5.1s 2.9s infinite ease-in-out;}

@keyframes nBubble1{
  0%,100%{transform:translate(0,0) scale(.86);opacity:.18}
  16%{opacity:.96}
  48%{transform:translate(8px,-10px) scale(1.05)}
  74%{transform:translate(16px,-24px) scale(1.18);opacity:.34}
  88%{transform:translate(20px,-30px) scale(.24);opacity:0}
}
@keyframes nBubble2{
  0%,100%{transform:translate(0,0) scale(.86);opacity:.16}
  18%{opacity:.92}
  50%{transform:translate(-4px,-9px) scale(1.02)}
  76%{transform:translate(-12px,-22px) scale(1.16);opacity:.30}
  90%{transform:translate(-16px,-28px) scale(.22);opacity:0}
}
@keyframes nBubble3{
  0%,100%{transform:translate(0,0) scale(.88);opacity:.18}
  14%{opacity:.96}
  46%{transform:translate(10px,-10px) scale(1.06)}
  72%{transform:translate(22px,-26px) scale(1.24);opacity:.36}
  88%{transform:translate(28px,-34px) scale(.24);opacity:0}
}
@keyframes nBubble4{
  0%,100%{transform:translate(0,0) scale(.86);opacity:.16}
  20%{opacity:.90}
  54%{transform:translate(6px,-9px) scale(1.04)}
  78%{transform:translate(16px,-22px) scale(1.16);opacity:.30}
  92%{transform:translate(20px,-29px) scale(.22);opacity:0}
}
@keyframes nBubble5{
  0%,100%{transform:translate(0,0) scale(.86);opacity:.16}
  18%{opacity:.92}
  52%{transform:translate(-6px,-8px) scale(1.03)}
  80%{transform:translate(-18px,-23px) scale(1.18);opacity:.28}
  94%{transform:translate(-24px,-30px) scale(.20);opacity:0}
}

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Вход</h2>
    <p>Чат и задачи клиники.</p>

    <button onclick="loginAs('anna')">Анна</button>
    <button onclick="loginAs('natalia')">Наталия</button>
    <button onclick="loginAs('alexey')">Алексей</button>
    <button onclick="loginAs('mikhail')">Михаил</button>
    <button onclick="loginAs('doctor')">Дарья</button>
    <button onclick="loginAs('doctor')">Дмитрий</button>

    <button class="small-btn" onclick="openSettings()">Настройки подключения</button>

    <div id="loginError" class="error-box"></div>
    <div class="note">
      Для работы нужны две таблицы в Supabase:<br/>
      1. messages<br/>
      2. tasks
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top">
    <div class="title">Система клиники v9.2</div>
    <div class="top-right">
      <div class="user-name" id="userName"></div>
      <button class="top-btn light" onclick="reconnect()">Переподключить</button>
      <button class="top-btn light" onclick="openSettings()">Настройки</button>
      <button class="top-btn" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('chat')">Чат</button>
    <button class="tab-btn" onclick="switchTab('tasks')">Задачи</button>
  </div>

  <!-- CHAT -->
  <div id="chatSection" class="section active">
    <div class="chat-shell">
      <div class="chat-wrap" id="chatWrap"></div>

      <div class="input-wrap">
        <input id="msgInput" placeholder="Введите сообщение"/>
        <button class="send-btn" onclick="sendMessage()">Отправить</button>
      </div>

      <div class="status-line" id="statusLine"></div>
    </div>
  </div>

  <!-- TASKS -->
  <div id="tasksSection" class="section">
    <div class="tasks-layout">

      <div class="task-form">
        <h3>Новая задача</h3>

        <div class="form-row">
          <label>Заголовок</label>
          <input id="taskTitle"/>
        </div>

        <div class="form-row">
          <label>Описание</label>
          <textarea id="taskDesc"></textarea>
        </div>

        <div class="form-row">
          <label>Кому</label>
          <select id="taskAssignee">
            <option value="Анна">Анна</option>
            <option value="Наталия">Наталия</option>
            <option value="Алексей">Алексей</option>
            <option value="Михаил">Михаил</option>
            <option value="Дарья">Дарья</option>
            <option value="Дмитрий">Дмитрий</option>
          </select>
        </div>

        <button class="task-btn" onclick="createTask()">Создать</button>
      </div>

      <div class="tasks-list">
        <h3>Список задач</h3>
        <div id="tasksList"></div>
      </div>

    </div>
  </div>
</div>

<!-- SETTINGS -->
<div id="settingsModal" class="modal">
  <div class="modal-card">
    <h4>Настройки подключения</h4>

    <div class="settings-row">
      <label>SUPABASE URL</label>
      <input id="supabaseUrl"/>
    </div>

    <div class="settings-row">
      <label>SUPABASE KEY</label>
      <input id="supabaseKey"/>
    </div>

    <div class="settings-actions">
      <button class="task-btn" onclick="saveSettings()">Сохранить</button>
      <button class="task-btn light" onclick="closeSettings()">Отмена</button>
    </div>
  </div>
</div>

<!-- ERROR MODAL -->
<div id="errorModal" class="modal">
  <div class="modal-card">
    <h4>Ошибка подключения</h4>
    <p id="errorText"></p>
    <button class="task-btn" onclick="closeError()">Закрыть</button>
  </div>
</div>

<script>
const USERS = {
  anna:     { label: "Анна",     className: "user-anna",    bodyClass: "role-admin-anna",   canChat: true  },
  natalia:  { label: "Наталия",  className: "user-natalia", bodyClass: "role-admin-natalia",canChat: true  },
  alexey:   { label: "Алексей",  className: "user-alexey",  bodyClass: "role-manager",      canChat: true  },
  mikhail:  { label: "Михаил",   className: "user-mikhail", bodyClass: "role-chief",        canChat: false },
  doctor:   { label: "Дарья",    className: "user-doctor",  bodyClass: "role-doctor",       canChat: false }
};

let currentUserKey = null;
let currentUser = null;
let currentTab = "chat";
let sb = null;
let chatChannel = null;
let taskChannel = null;
let messagesCache = [];
let tasksCache = [];

function $(id){ return document.getElementById(id); }

function openSettings(){
  $("supabaseUrl").value = localStorage.getItem("clinic_supabase_url") || "";
  $("supabaseKey").value = localStorage.getItem("clinic_supabase_key") || "";
  $("settingsModal").classList.add("active");
}
function closeSettings(){
  $("settingsModal").classList.remove("active");
}
function showError(text){
  $("errorText").textContent = text || "Неизвестная ошибка";
  $("errorModal").classList.add("active");
}
function closeError(){
  $("errorModal").classList.remove("active");
}

function saveSettings(){
  const url = $("supabaseUrl").value.trim();
  const key = $("supabaseKey").value.trim();

  if(!url || !key){
    showError("Заполни URL и KEY.");
    return;
  }

  localStorage.setItem("clinic_supabase_url", url);
  localStorage.setItem("clinic_supabase_key", key);
  closeSettings();

  if(currentUserKey){
    reconnect();
  }
}

function getSettings(){
  return {
    url: localStorage.getItem("clinic_supabase_url") || "",
    key: localStorage.getItem("clinic_supabase_key") || ""
  };
}

function createClient(){
  const cfg = getSettings();
  if(!cfg.url || !cfg.key){
    throw new Error("Сначала укажи настройки подключения.");
  }
  if(!window.supabase || !window.supabase.createClient){
    throw new Error("Библиотека Supabase не загрузилась.");
  }
  return window.supabase.createClient(cfg.url, cfg.key);
}

async function stopRealtime(){
  if(chatChannel && sb){
    try{ await sb.removeChannel(chatChannel); }catch(e){}
  }
  if(taskChannel && sb){
    try{ await sb.removeChannel(taskChannel); }catch(e){}
  }
  chatChannel = null;
  taskChannel = null;
}

function loginAs(key){
  currentUserKey = key;
  currentUser = USERS[key];
  document.body.className = currentUser.bodyClass;

  $("login").style.display = "none";
  $("app").style.display = "block";
  $("userName").textContent = currentUser.label;

  if(!currentUser.canChat){
    switchTab("tasks");
  }else{
    switchTab("chat");
  }

  reconnect();
}

function logout(){
  stopRealtime();
  sb = null;
  currentUserKey = null;
  currentUser = null;
  document.body.className = "";
  $("login").style.display = "flex";
  $("app").style.display = "none";
  $("chatWrap").innerHTML = "";
  $("tasksList").innerHTML = "";
  $("statusLine").textContent = "";
}

function switchTab(tab){
  currentTab = tab;
  const buttons = document.querySelectorAll(".tab-btn");
  buttons.forEach((btn, i)=>{
    const isChatBtn = i === 0;
    btn.classList.toggle("active", (tab === "chat" && isChatBtn) || (tab === "tasks" && !isChatBtn));
  });

  $("chatSection").classList.toggle("active", tab === "chat");
  $("tasksSection").classList.toggle("active", tab === "tasks");
}

function makeEffectsFor(userClass){
  if(userClass === "user-anna"){
    return `
      <div class="fx-cloudline">
        <span class="cloud c1"><i></i></span>
        <span class="cloud c2"><i></i></span>
        <span class="cloud c3"><i></i></span>
        <span class="cloud c4"><i></i></span>
      </div>
    `;
  }
  if(userClass === "user-natalia"){
    return `
      <div class="fx-bubbleline">
        <span class="b1"></span>
        <span class="b2"></span>
        <span class="b3"></span>
        <span class="b4"></span>
        <span class="b5"></span>
      </div>
    `;
  }
  if(userClass === "user-alexey"){
    return `
      <div class="fx-electric">
        <span class="edge-glow"></span>
        <span class="flash"></span>
        <span class="spark s1"></span>
        <span class="spark s2"></span>
        <span class="spark s3"></span>
        <span class="bolt"></span>
        <span class="pulse"></span>
      </div>
    `;
  }
  return "";
}

function formatTime(iso){
  if(!iso) return "";
  const d = new Date(iso);
  if(Number.isNaN(d.getTime())) return "";
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function renderMessages(){
  const wrap = $("chatWrap");
  wrap.innerHTML = `<div class="day-label">Сегодня</div>`;

  messagesCache.forEach(row=>{
    const mine = currentUser && row.user === currentUser.label;
    const userClass =
      row.user === "Анна" ? "user-anna" :
      row.user === "Наталия" ? "user-natalia" :
      row.user === "Алексей" ? "user-alexey" :
      row.user === "Михаил" ? "user-mikhail" :
      "user-doctor";

    const line = document.createElement("div");
    line.className = `msg-row ${mine ? "mine" : "other"}`;

    const msg = document.createElement("div");
    msg.className = `msg ${mine ? "mine" : "other"} ${userClass}`;
    msg.innerHTML = `
      ${makeEffectsFor(userClass)}
      <div class="msg-head">${row.user || ""}</div>
      <div class="msg-text">${escapeHtml(row.text || "")}</div>
      <div class="msg-meta">${formatTime(row.created_at)}</div>
    `;

    line.appendChild(msg);
    wrap.appendChild(line);
  });

  wrap.scrollTop = wrap.scrollHeight;
}

function renderTasks(){
  const list = $("tasksList");
  if(!tasksCache.length){
    list.innerHTML = `<div style="color:var(--muted);font-size:14px;">Задач пока нет.</div>`;
    return;
  }

  list.innerHTML = tasksCache.map(task=>{
    const statusClass =
      task.status === "done" ? "status-done" :
      task.status === "progress" ? "status-progress" :
      "status-new";

    const statusText =
      task.status === "done" ? "Завершена" :
      task.status === "progress" ? "В работе" :
      "Новая";

    return `
      <div class="task-card">
        <div class="task-title">${escapeHtml(task.title || "Без названия")}</div>
        <div class="task-desc">${escapeHtml(task.description || "Без описания")}</div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
          <span class="badge author">Поставил: ${escapeHtml(task.author || "")}</span>
          <span class="badge assignee">Ответственный: ${escapeHtml(task.assignee || "")}</span>
          <span class="badge ${statusClass}">${statusText}</span>
        </div>
      </div>
    `;
  }).join("");
}

async function reconnect(){
  if(!currentUser) return;

  try{
    $("statusLine").textContent = "Подключение...";
    await stopRealtime();
    sb = createClient();

    if(currentUser.canChat){
      await loadMessages();
      startMessagesRealtime();
    }else{
      $("chatWrap").innerHTML = `<div class="day-label">Чат отключен</div>`;
    }

    await loadTasks();
    startTasksRealtime();

    $("statusLine").textContent = "Подключено";
  }catch(err){
    $("statusLine").textContent = "Ошибка подключения";
    showError(err.message || String(err));
  }
}

async function loadMessages(){
  const { data, error } = await sb
    .from("messages")
    .select("*")
    .order("id", { ascending: true })
    .limit(300);

  if(error) throw new Error("Не удалось загрузить сообщения: " + error.message);

  messagesCache = Array.isArray(data) ? data : [];
  renderMessages();
}

async function loadTasks(){
  const { data, error } = await sb
    .from("tasks")
    .select("*")
    .order("id", { ascending: false })
    .limit(200);

  if(error) throw new Error("Не удалось загрузить задачи: " + error.message);

  tasksCache = Array.isArray(data) ? data : [];
  renderTasks();
}

function startMessagesRealtime(){
  chatChannel = sb
    .channel("messages-live-v92")
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "messages"
    }, async ()=>{
      await loadMessages();
    })
    .subscribe();
}

function startTasksRealtime(){
  taskChannel = sb
    .channel("tasks-live-v92")
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "tasks"
    }, async ()=>{
      await loadTasks();
    })
    .subscribe();
}

async function sendMessage(){
  if(!currentUser || !currentUser.canChat) return;

  const input = $("msgInput");
  const text = input.value.trim();
  if(!text) return;
  if(!sb){
    showError("Нет подключения к базе.");
    return;
  }

  try{
    const { error } = await sb.from("messages").insert({
      user: currentUser.label,
      text
    });

    if(error) throw error;

    input.value = "";
  }catch(err){
    showError("Не удалось отправить сообщение: " + (err.message || err));
  }
}

async function createTask(){
  if(!sb || !currentUser) return;

  const title = $("taskTitle").value.trim();
  const description = $("taskDesc").value.trim();
  const assignee = $("taskAssignee").value;

  if(!title){
    showError("Введите заголовок задачи.");
    return;
  }

  try{
    const { error } = await sb.from("tasks").insert({
      title,
      description,
      assignee,
      author: currentUser.label,
      status: "new"
    });

    if(error) throw error;

    $("taskTitle").value = "";
    $("taskDesc").value = "";
  }catch(err){
    showError("Не удалось создать задачу: " + (err.message || err));
  }
}

function escapeHtml(str){
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

document.addEventListener("keydown", (e)=>{
  if(e.key === "Escape"){
    closeSettings();
    closeError();
  }
});

$("msgInput").addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    sendMessage();
  }
});

document.addEventListener("click", (e)=>{
  if(e.target.id === "settingsModal") closeSettings();
  if(e.target.id === "errorModal") closeError();
});
</script>
</body>
</html>
