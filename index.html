<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Система клиники v10.0</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*,
*::before,
*::after{
  box-sizing:border-box;
}

:root{
  --bg:#f5f1ee;
  --bg-soft:#fffdfa;
  --panel:#ffffffc9;
  --panel-strong:#ffffffef;
  --text:#2b2b2b;
  --muted:#716861;
  --line:#e7ddd5;
  --line-soft:#f1e8e1;
  --shadow:0 18px 60px rgba(30,24,19,.10);
  --shadow-soft:0 10px 30px rgba(30,24,19,.07);
  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --tab:#ece4de;
  --tab-active:#161616;
  --tab-active-text:#ffffff;
  --input:#ffffff;
  --input-line:#d8cdc4;
  --btn:#111111;
  --btn-text:#ffffff;
  --danger:#b3261e;
  --success:#2f6f46;
  --warn:#7b5b31;

  --anna-1:#fff8fb;
  --anna-2:#ffeaf2;
  --anna-3:#ffdbe8;
  --anna-4:#f2aac3;
  --anna-shadow:rgba(242,170,195,.24);

  --natalia-1:#fbfdff;
  --natalia-2:#edf6ff;
  --natalia-3:#ddeeff;
  --natalia-4:#9abce8;
  --natalia-shadow:rgba(118,165,226,.22);

  --alexey-1:#0c121d;
  --alexey-2:#111827;
  --alexey-3:#182235;
  --alexey-4:#273757;
  --alexey-glow:rgba(114,178,255,.34);
  --alexey-glow-2:rgba(114,178,255,.16);
  --alexey-text:#e8f1ff;

  --mikhail-1:#f6f3ff;
  --mikhail-2:#ece6ff;
  --mikhail-3:#b4a6ee;

  --doctor-1:#f9fbfc;
  --doctor-2:#eef3f6;
  --doctor-3:#b7c6d1;

  --assistant-1:#faf8f3;
  --assistant-2:#efe9dc;
  --assistant-3:#c7b393;
}

html{
  scroll-behavior:smooth;
  overflow-x:hidden;
}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 14% 10%, rgba(255,255,255,.72), transparent 22%),
    radial-gradient(circle at 86% 12%, rgba(255,255,255,.52), transparent 22%),
    radial-gradient(circle at 50% 90%, rgba(255,255,255,.26), transparent 28%),
    linear-gradient(180deg,#f8f4f1 0%, #f4eeea 100%);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  transition:background .28s ease,color .28s ease;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 20% 25%, rgba(255,255,255,.34), transparent 18%),
    radial-gradient(circle at 80% 18%, rgba(255,255,255,.18), transparent 16%);
  opacity:.95;
  z-index:0;
}

body.role-admin-anna{
  --bg:#f8f2f5;
  --bg-soft:#fffdfd;
  --panel:#fffafcf0;
  --panel-strong:#fffdfdf5;
  --text:#4e3842;
  --muted:#7d6972;
  --line:#efd8e1;
  --line-soft:#f7e9ef;
  --tab:#f8e7ee;
  --tab-active:#d98daa;
  --tab-active-text:#ffffff;
  --input:#fffdfd;
  --input-line:#ead1dc;
  --btn:#d98daa;
  --btn-text:#ffffff;
  --shadow:0 18px 60px rgba(215,141,170,.16);
  --shadow-soft:0 10px 30px rgba(215,141,170,.10);
}

body.role-admin-anna::before{
  background:
    radial-gradient(circle at 14% 12%, rgba(255,230,239,.88), transparent 22%),
    radial-gradient(circle at 82% 10%, rgba(255,243,247,.92), transparent 24%),
    radial-gradient(circle at 52% 88%, rgba(255,227,238,.58), transparent 25%);
}

body.role-admin-natalia{
  --bg:#f3f8fd;
  --bg-soft:#fcfeff;
  --panel:#fbfdfff0;
  --panel-strong:#fffffffa;
  --text:#314253;
  --muted:#6c7d8d;
  --line:#dae8f5;
  --line-soft:#eaf3fb;
  --tab:#e4eef8;
  --tab-active:#87abd9;
  --tab-active-text:#ffffff;
  --input:#ffffff;
  --input-line:#cfe0ef;
  --btn:#87abd9;
  --btn-text:#ffffff;
  --shadow:0 18px 60px rgba(114,156,212,.16);
  --shadow-soft:0 10px 30px rgba(114,156,212,.10);
}

body.role-admin-natalia::before{
  background:
    radial-gradient(circle at 16% 10%, rgba(220,236,255,.92), transparent 22%),
    radial-gradient(circle at 84% 12%, rgba(244,249,255,.96), transparent 23%),
    radial-gradient(circle at 50% 88%, rgba(220,235,251,.48), transparent 27%);
}

body.role-manager{
  --bg:#0d1219;
  --bg-soft:#131a24;
  --panel:rgba(20,27,38,.88);
  --panel-strong:rgba(18,25,36,.96);
  --text:#e8eef8;
  --muted:#92a0b4;
  --line:#253040;
  --line-soft:#1d2633;
  --tab:#1a2230;
  --tab-active:#2c3950;
  --tab-active-text:#eff5ff;
  --input:#101723;
  --input-line:#2a3547;
  --btn:#263448;
  --btn-text:#f2f7ff;
  --shadow:0 20px 70px rgba(0,0,0,.42);
  --shadow-soft:0 10px 30px rgba(0,0,0,.30);
}

body.role-manager::before{
  background:
    radial-gradient(circle at 16% 12%, rgba(67,102,160,.22), transparent 24%),
    radial-gradient(circle at 82% 10%, rgba(255,255,255,.05), transparent 18%),
    radial-gradient(circle at 52% 88%, rgba(56,86,133,.16), transparent 28%);
  opacity:1;
}

body.role-chief{
  --bg:#f5f1fd;
  --bg-soft:#ffffff;
  --panel:#fffdfef0;
  --panel-strong:#fffffffb;
  --text:#433b56;
  --muted:#766d88;
  --line:#e5ddf4;
  --line-soft:#f0eafb;
  --tab:#efe7fa;
  --tab-active:#7b68b4;
  --tab-active-text:#ffffff;
  --input:#ffffff;
  --input-line:#d8cff0;
  --btn:#7b68b4;
  --btn-text:#ffffff;
  --shadow:0 18px 60px rgba(123,104,180,.14);
  --shadow-soft:0 10px 30px rgba(123,104,180,.09);
}

body.role-doctor{
  --bg:#eef4f7;
  --bg-soft:#fbfdff;
  --panel:#fbfdfff0;
  --panel-strong:#fffffffb;
  --text:#2f3f4b;
  --muted:#6b7c89;
  --line:#dbe5ec;
  --line-soft:#edf2f6;
  --tab:#e4ecf2;
  --tab-active:#8196a6;
  --tab-active-text:#ffffff;
  --input:#ffffff;
  --input-line:#cfdae2;
  --btn:#7e93a2;
  --btn-text:#ffffff;
  --shadow:0 18px 60px rgba(98,120,137,.12);
  --shadow-soft:0 10px 30px rgba(98,120,137,.08);
}

body.role-assistant{
  --bg:#f6f2ea;
  --bg-soft:#fffdf8;
  --panel:#fffdf7f0;
  --panel-strong:#fffefcfb;
  --text:#4a4035;
  --muted:#7f7367;
  --line:#e7ddcf;
  --line-soft:#f1eadf;
  --tab:#efe7db;
  --tab-active:#9a8465;
  --tab-active-text:#ffffff;
  --input:#fffdf8;
  --input-line:#dbcfbf;
  --btn:#9a8465;
  --btn-text:#ffffff;
  --shadow:0 18px 60px rgba(134,111,80,.14);
  --shadow-soft:0 10px 30px rgba(134,111,80,.08);
}

.hidden{
  display:none !important;
}

button,
input,
select,
textarea{
  font:inherit;
}

button{
  -webkit-tap-highlight-color:transparent;
}

#login{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  position:relative;
  z-index:1;
}

.login-card{
  width:min(100%, 420px);
  background:var(--panel-strong);
  border:1px solid var(--line);
  border-radius:32px;
  box-shadow:var(--shadow);
  padding:22px;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(14px);
}

.login-card::before{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:140px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.58), transparent),
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.48), transparent 26%);
  pointer-events:none;
}

.login-head{
  position:relative;
  z-index:1;
  margin-bottom:14px;
}

.login-title{
  margin:0 0 8px;
  font-size:28px;
  line-height:1.05;
  font-weight:900;
  letter-spacing:.01em;
}

.login-subtitle{
  margin:0;
  color:var(--muted);
  font-size:14px;
  line-height:1.45;
}

.login-groups{
  display:grid;
  gap:12px;
  position:relative;
  z-index:1;
}

.login-group{
  border:1px solid var(--line-soft);
  background:rgba(255,255,255,.45);
  border-radius:22px;
  padding:12px;
}

body.role-manager #login .login-group{
  background:rgba(255,255,255,.02);
}

.login-group-title{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
  font-weight:800;
  margin-bottom:10px;
}

.login-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.login-btn{
  width:100%;
  min-height:46px;
  border:none;
  border-radius:16px;
  padding:12px 14px;
  cursor:pointer;
  transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease, filter .16s ease;
  background:var(--tab);
  color:var(--text);
  font-size:14px;
  font-weight:800;
  box-shadow:0 6px 16px rgba(0,0,0,.05);
}

.login-btn:hover{
  transform:translateY(-1px);
}

.login-btn:active{
  transform:translateY(0);
}

.login-btn.role-anna{
  background:linear-gradient(180deg, #fff7fb, #ffeaf3);
  color:#644451;
}

.login-btn.role-natalia{
  background:linear-gradient(180deg, #fcfeff, #ebf5ff);
  color:#42607d;
}

.login-btn.role-alexey{
  background:linear-gradient(180deg, #243249, #141d2b);
  color:#eef4ff;
}

.login-btn.role-mikhail{
  background:linear-gradient(180deg, #f7f4ff, #ece6ff);
  color:#524773;
}

.login-btn.role-doctor{
  background:linear-gradient(180deg, #fbfdff, #edf3f6);
  color:#425360;
}

.login-btn.role-assistant{
  background:linear-gradient(180deg, #fffdf8, #efe7db);
  color:#5e5143;
}

.login-footer{
  margin-top:14px;
  position:relative;
  z-index:1;
}

.settings-open-btn{
  width:100%;
  min-height:46px;
  border:none;
  border-radius:16px;
  background:#121212;
  color:#fff;
  cursor:pointer;
  font-weight:800;
  transition:transform .16s ease, opacity .16s ease;
}

.settings-open-btn:hover{
  transform:translateY(-1px);
}

.login-note{
  margin-top:12px;
  color:var(--muted);
  font-size:12px;
  line-height:1.5;
}

.login-error{
  margin-top:12px;
  display:none;
  padding:12px 14px;
  border-radius:16px;
  background:#fff0f0;
  color:#9d1f1f;
  font-size:13px;
  line-height:1.45;
  white-space:pre-wrap;
}

#app{
  display:none;
  min-height:100vh;
  padding:12px 12px calc(86px + env(safe-area-inset-bottom));
  position:relative;
  z-index:1;
}

.app-shell{
  width:min(100%, 1320px);
  margin:0 auto;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}

.topbar-left{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.app-title{
  font-size:19px;
  font-weight:900;
  letter-spacing:.015em;
}

.app-subtitle{
  font-size:12px;
  color:var(--muted);
  font-weight:600;
}

.topbar-right{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  gap:8px;
  flex-wrap:wrap;
}

.current-user-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:40px;
  padding:8px 14px;
  border-radius:999px;
  background:var(--panel);
  border:1px solid var(--line);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(10px);
  font-size:13px;
  font-weight:800;
}

.current-user-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:currentColor;
  opacity:.75;
}

.top-btn{
  min-height:40px;
  border:none;
  border-radius:14px;
  padding:10px 14px;
  cursor:pointer;
  font-size:13px;
  font-weight:800;
  transition:transform .16s ease, opacity .16s ease, box-shadow .16s ease;
}

.top-btn:hover{
  transform:translateY(-1px);
}

.top-btn.primary{
  background:var(--btn);
  color:var(--btn-text);
  box-shadow:0 10px 22px rgba(0,0,0,.12);
}

.top-btn.secondary{
  background:var(--panel);
  color:var(--text);
  border:1px solid var(--line);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(8px);
}

.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.tab-btn{
  border:none;
  min-height:42px;
  padding:11px 15px;
  border-radius:15px;
  cursor:pointer;
  background:var(--tab);
  color:var(--text);
  font-size:14px;
  font-weight:800;
  transition:transform .16s ease, background .16s ease, color .16s ease, box-shadow .16s ease;
}

.tab-btn:hover{
  transform:translateY(-1px);
}

.tab-btn.active{
  background:var(--tab-active);
  color:var(--tab-active-text);
  box-shadow:0 10px 24px rgba(0,0,0,.10);
}

.section{
  display:none;
}

.section.active{
  display:block;
  animation:sectionIn .22s ease;
}

@keyframes sectionIn{
  from{
    opacity:0;
    transform:translateY(6px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
}

.chat-layout{
  display:grid;
  grid-template-columns:minmax(0,1fr);
  gap:12px;
}

.chat-panel{
  position:relative;
  overflow:hidden;
}

.chat-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:14px 14px 0;
}

.chat-head-left{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.chat-title{
  font-size:18px;
  font-weight:900;
}

.chat-status{
  min-height:18px;
  color:var(--muted);
  font-size:12px;
  font-weight:600;
}

.chat-head-right{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.chat-mini-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  min-height:30px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(255,255,255,.46);
  border:1px solid var(--line-soft);
  color:var(--muted);
  font-size:11px;
  font-weight:800;
}

body.role-manager .chat-mini-pill{
  background:rgba(255,255,255,.03);
}

.chat-shell{
  position:relative;
  padding:12px;
}

.chat-wrap{
  position:relative;
  height:min(62vh, 760px);
  min-height:360px;
  padding:12px;
  overflow:auto;
  overflow-x:hidden;
  border-radius:24px;
  background:rgba(255,255,255,.56);
  border:1px solid var(--line);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.16);
  scroll-behavior:smooth;
  overscroll-behavior:contain;
}

body.role-manager .chat-wrap{
  background:rgba(10,16,25,.58);
  border-color:#1f2a3b;
}

.chat-wrap::-webkit-scrollbar{
  width:10px;
}

.chat-wrap::-webkit-scrollbar-track{
  background:transparent;
}

.chat-wrap::-webkit-scrollbar-thumb{
  background:rgba(0,0,0,.14);
  border-radius:999px;
  border:2px solid transparent;
  background-clip:padding-box;
}

body.role-manager .chat-wrap::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.14);
  border:2px solid transparent;
  background-clip:padding-box;
}

#fxLayer{
  position:absolute;
  inset:12px;
  overflow:hidden;
  pointer-events:none;
  z-index:4;
  border-radius:24px;
}

.chat-empty{
  min-height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
  padding:22px;
}

.day-label{
  margin:4px 0 10px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
  font-weight:800;
  letter-spacing:.03em;
}

.msg-row{
  display:flex;
  margin:12px 0;
  position:relative;
  z-index:5;
  animation:msgIn .22s ease;
}

.msg-row.mine{
  justify-content:flex-end;
}

.msg-row.other{
  justify-content:flex-start;
}

@keyframes msgIn{
  from{
    opacity:0;
    transform:translateY(8px) scale(.985);
  }
  to{
    opacity:1;
    transform:translateY(0) scale(1);
  }
}

.msg{
  position:relative;
  isolation:isolate;
  width:fit-content;
  max-width:min(84%, 760px);
  min-width:100px;
  padding:12px 14px;
  line-height:1.4;
  box-shadow:0 10px 28px rgba(0,0,0,.08);
  transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease;
  word-break:break-word;
  overflow:visible;
}

.msg:hover{
  transform:translateY(-1px);
  box-shadow:0 14px 30px rgba(0,0,0,.10);
}

.msg.sending{
  opacity:.72;
}

.msg-head,
.msg-text,
.msg-meta{
  position:relative;
  z-index:7;
}

.msg-head{
  font-size:12px;
  font-weight:900;
  margin-bottom:4px;
}

.msg-text{
  font-size:14px;
  white-space:pre-wrap;
}

.msg-meta{
  margin-top:6px;
  font-size:11px;
  opacity:.72;
  text-align:right;
}

.msg.user-anna{
  color:#5c404c;
  background:
    radial-gradient(circle at 18% 48%, rgba(255,255,255,.99) 0 24px, transparent 25px),
    radial-gradient(circle at 36% 28%, rgba(255,247,250,.99) 0 31px, transparent 32px),
    radial-gradient(circle at 55% 20%, rgba(255,236,245,.99) 0 37px, transparent 38px),
    radial-gradient(circle at 76% 30%, rgba(255,242,248,.99) 0 31px, transparent 32px),
    radial-gradient(circle at 88% 52%, rgba(255,233,243,.98) 0 23px, transparent 24px),
    radial-gradient(circle at 72% 78%, rgba(255,229,240,.98) 0 30px, transparent 31px),
    radial-gradient(circle at 48% 84%, rgba(255,238,245,.99) 0 34px, transparent 35px),
    radial-gradient(circle at 22% 74%, rgba(255,246,249,.99) 0 27px, transparent 28px),
    linear-gradient(180deg, #fff8fb, #ffe8f1);
  border-radius:62px 68px 60px 64px / 58px 62px 60px 56px;
  box-shadow:
    0 16px 34px rgba(242,170,195,.18),
    0 0 0 1px rgba(255,255,255,.36) inset;
  animation:annaBody 5.6s ease-in-out infinite;
}

.msg.user-anna::before,
.msg.user-anna::after{
  content:"";
  position:absolute;
  border-radius:999px;
  z-index:2;
  background:radial-gradient(circle at 38% 38%, #fffdfd, #ffe9f3 70%, #ffd9e8);
  box-shadow:0 6px 14px rgba(242,170,195,.16);
}

.msg.user-anna::before{
  width:40px;
  height:26px;
  left:12px;
  top:-8px;
  animation:annaLobeA 4.8s ease-in-out infinite;
}

.msg.user-anna::after{
  width:30px;
  height:22px;
  right:16px;
  top:-5px;
  animation:annaLobeB 5.2s ease-in-out infinite;
}

.msg.mine.user-anna{
  border-radius:62px 62px 30px 62px / 58px 58px 34px 58px;
}

.msg.other.user-anna{
  border-radius:62px 62px 62px 30px / 58px 58px 58px 34px;
}

@keyframes annaBody{
  0%,100%{
    border-radius:62px 68px 60px 64px / 58px 62px 60px 56px;
    transform:translateY(0) scale(1);
  }
  50%{
    border-radius:68px 60px 66px 58px / 62px 56px 64px 54px;
    transform:translateY(-1px) scale(1.014);
  }
}

@keyframes annaLobeA{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(3px,-2px) scale(1.08)}
}

@keyframes annaLobeB{
  0%,100%{transform:translate(0,0) scale(1)}
  50%{transform:translate(-4px,-1px) scale(1.06)}
}

  tasksBtn.classList.remove("active");

  if(tab === "chat"){
    $("chatSection").classList.add("active");
    chatBtn.classList.add("active");
  } else {
    $("tasksSection").classList.add("active");
    tasksBtn.classList.add("active");
  }
}

function fillTaskAssigneeOptions(){
  const select = $("taskAssignee");
  const users = Object.values(USERS);

  select.innerHTML = users.map(user => {
    return `<option value="${escapeHtml(user.label)}">${escapeHtml(user.label)}</option>`;
  }).join("");
}

function updateAccessVisibility(){
  const chatTabBtn = document.querySelector('.tab-btn:nth-child(1)');
  const msgInput = $("msgInput");
  const sendBtn = document.querySelector(".send-btn");

  if(currentUser && currentUser.canChat){
    chatTabBtn.style.display = "";
    msgInput.disabled = false;
    sendBtn.disabled = false;
    msgInput.placeholder = "Сообщение...";
  } else {
    chatTabBtn.style.display = "none";
    msgInput.disabled = true;
    sendBtn.disabled = true;
    msgInput.placeholder = "Чат отключен для этой роли";
    switchTab("tasks");
  }

  if(currentUser && currentUser.canCreateTasks){
    $("taskTitle").disabled = false;
    $("taskDesc").disabled = false;
    $("taskAssignee").disabled = false;
  } else {
    $("taskTitle").disabled = true;
    $("taskDesc").disabled = true;
    $("taskAssignee").disabled = true;
  }
}

 async function loginAs(userId){
  try{
    clearLoginError();

    if(!USERS[userId]){
      throw new Error("Неизвестный пользователь");
    }

    currentUser = USERS[userId];
    localStorage.setItem("clinic_crm_user", userId);

    applyTheme(currentUser);
    $("userName").textContent = currentUser.label;
    fillTaskAssigneeOptions();
    updateAccessVisibility();
    showApp();

    if(!sb){
      sb = createClient();
    }

    await initDataAndRealtime();
  }catch(error){
    console.error("login init error", error);

    if(currentUser){
      showApp();
      if(currentUser.canChat){
        setChatStatus("ошибка сети, пытаюсь переподключиться...");
      }else{
        setChatStatus("чат отключен для этой роли");
      }
      scheduleReconnect("login");
      return;
    }

    showLoginError("Не удалось войти.\n" + (error?.message || "Неизвестная ошибка"));
    showLogin();
  }
}

async function logout(){
  await stopRealtime();
  currentUser = null;
  messagesCache = [];
  tasksCache = [];
  clearReconnectTimer();
  applyTheme(null);
  localStorage.removeItem("clinic_crm_user");
  $("chatWrap").innerHTML = "";
  $("fxLayer").innerHTML = "";
  $("tasksList").innerHTML = "";
  showLogin();
}
function clearReconnectTimer(){
  if(reconnectTimer){
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
  }
}

function setChatStatus(text){
  $("chatStatus").textContent = text;
}

async function stopRealtime(){
  try{
    if(chatChannel && sb){
      await sb.removeChannel(chatChannel);
    }
  }catch(e){
    console.warn("remove chat channel error", e);
  }

  try{
    if(taskChannel && sb){
      await sb.removeChannel(taskChannel);
    }
  }catch(e){
    console.warn("remove task channel error", e);
  }

  chatChannel = null;
  taskChannel = null;
}

async function initDataAndRealtime(){
  await stopRealtime();

  let messagesOk = false;
  let tasksOk = false;

  if(currentUser && currentUser.canChat){
    try{
      setChatStatus("загрузка сообщений...");
      await loadMessages();
      messagesOk = true;
    }catch(error){
      console.error("loadMessages error", error);
      $("chatWrap").innerHTML = `<div class="chat-empty">Не удалось загрузить чат. Идёт попытка переподключения...</div>`;
      $("fxLayer").innerHTML = "";
      setChatStatus("чат временно недоступен");
    }
  }else{
    setChatStatus("чат отключен для этой роли");
    renderNoChatState();
  }

  try{
    await loadTasks();
    tasksOk = true;
  }catch(error){
    console.error("loadTasks error", error);
    $("tasksList").innerHTML = `<div style="color:var(--muted);font-size:14px;">Не удалось загрузить задачи. Идёт попытка переподключения...</div>`;
  }

  if(currentUser && currentUser.canChat){
    try{
      startMessagesRealtime();
    }catch(error){
      console.error("startMessagesRealtime error", error);
    }
  }

  try{
    startTasksRealtime();
  }catch(error){
    console.error("startTasksRealtime error", error);
  }

  if(messagesOk || tasksOk){
    if(currentUser && currentUser.canChat){
      setChatStatus("чат подключен");
    }else{
      setChatStatus("чат отключен для этой роли");
    }
  }else{
    if(currentUser && currentUser.canChat){
      setChatStatus("нет соединения, переподключение...");
    }
    scheduleReconnect("init");
  }
}function renderNoChatState(){
  $("chatWrap").innerHTML = `<div class="chat-empty">Для этой роли чат сейчас отключен.</div>`;
  $("fxLayer").innerHTML = "";
}

function getUserClass(userLabel){
  const user = Object.values(USERS).find(item => item.label === userLabel);
  return user ? user.userClass : "user-doctor";
}

function makeEffectsFor(userClass){
  if(userClass !== "user-alexey") return "";
  return `
    <div class="fx-electric">
      <div class="edge-glow"></div>
      <div class="flash"></div>
      <div class="spark s1"></div>
      <div class="spark s2"></div>
      <div class="spark s3"></div>
      <div class="bolt"></div>
      <div class="pulse"></div>
    </div>
  `;
}

function getParticleAnchor(rowEl, msgEl, offsetY = 34){
  const wrap = $("chatWrap");
  const wrapRect = wrap.getBoundingClientRect();
  const box = msgEl.getBoundingClientRect();
  const mine = rowEl.classList.contains("mine");

  const x = mine
    ? box.left - wrapRect.left + wrap.scrollLeft + 18
    : box.right - wrapRect.left + wrap.scrollLeft - 18;

  const y = box.top - wrapRect.top + wrap.scrollTop + Math.min(offsetY, Math.max(18, box.height * 0.55));

  return { x, y, mine };
}

function spawnCloudPuff(rowEl, msgEl){
  if(!document.body.contains(msgEl)) return;

  const { x, y, mine } = getParticleAnchor(rowEl, msgEl, 34);

  const puff = document.createElement("div");
  puff.className = "particle cloud-puff";
  puff.style.left = `${x}px`;
  puff.style.top = `${y}px`;
  puff.style.width = "44px";
  puff.style.height = "30px";

  const circles = [
    { x: 0,  y: 8,  w: 18, h: 18 },
    { x: 10, y: 0,  w: 22, h: 22 },
    { x: 22, y: 7,  w: 18, h: 18 },
    { x: 12, y: 11, w: 20, h: 16 }
  ];

  circles.forEach(cfg => {
    const c = document.createElement("span");
    c.className = "c";
    c.style.left = cfg.x + "px";
    c.style.top = cfg.y + "px";
    c.style.width = cfg.w + "px";
    c.style.height = cfg.h + "px";
    puff.appendChild(c);
  });

  $("fxLayer").appendChild(puff);

  const dx = (mine ? -1 : 1) * (90 + Math.random() * 80);
  const dy = -(12 + Math.random() * 38);
  const rot = Math.random() * 18 - 9;
  const duration = 1700 + Math.random() * 700;

  puff.animate([
    { transform: "translate(0px,0px) scale(.7) rotate(0deg)", opacity: 0 },
    { transform: `translate(${dx * .28}px, ${dy * .28}px) scale(1) rotate(${rot * .3}deg)`, opacity: .96, offset: .22 },
    { transform: `translate(${dx * .72}px, ${dy * .72}px) scale(1.12) rotate(${rot * .7}deg)`, opacity: .54, offset: .72 },
    { transform: `translate(${dx}px, ${dy}px) scale(1.24) rotate(${rot}deg)`, opacity: 0 }
  ], {
    duration,
    easing: "cubic-bezier(.22,.61,.36,1)"
  });

  setTimeout(() => puff.remove(), duration + 100);
}

function spawnBubblePuff(rowEl, msgEl){
  if(!document.body.contains(msgEl)) return;

  bubble.style.left = `${x}px`;
  bubble.style.top = `${y}px`;

  $("fxLayer").appendChild(bubble);

  const dy = -(14 + Math.random() * 58);
  const duration = 1500 + Math.random() * 800;

  bubble.animate([
    { transform: "translate(0px,0px) scale(.68)", opacity: 0 },
    { transform: `translate(${dx * .24}px, ${dy * .24}px) scale(1)`, opacity: .94, offset: .18 },
    { transform: `translate(${dx * .68}px, ${dy * .68}px) scale(.92)`, opacity: .5, offset: .70 },

  ], {
    duration,
    easing: "cubic-bezier(.22,.61,.36,1)"
  });

  setTimeout(() => bubble.remove(), duration + 100);
}

  arc.style.top = `${y}px`;

function spawnEnergySpark(msgEl){

function stopLiveEffect(msgEl){
  const timers = liveTimers.get(msgEl);
  if(!timers) return;

  if(timers.timerA) clearInterval(timers.timerA);
  if(timers.timerB) clearInterval(timers.timerB);

  liveTimers.delete(msgEl);
}

function stopAllLiveEffects(){
  document.querySelectorAll(".msg").forEach(msgEl => stopLiveEffect(msgEl));
  $("fxLayer").innerHTML = "";
}

function startLiveEffect(rowEl, msgEl, userLabel){
  if(liveTimers.has(msgEl)) return;

  let timerA = null;
  let timerB = null;

  if(userLabel === "Анна"){
    for(let i = 0; i < 3; i++){
      setTimeout(() => spawnCloudPuff(rowEl, msgEl), i * 180);
    }

    timerA = setInterval(() => {
      const count = 1 + Math.floor(Math.random() * 2);
      for(let i = 0; i < count; i++){
        setTimeout(() => spawnCloudPuff(rowEl, msgEl), i * 180);
      }
    }, 1350);
  }

  if(userLabel === "Наталия"){
    for(let i = 0; i < 4; i++){
      setTimeout(() => spawnBubblePuff(rowEl, msgEl), i * 120);
    }

    timerA = setInterval(() => {
      const count = 2 + Math.floor(Math.random() * 2);
      for(let i = 0; i < count; i++){
        setTimeout(() => spawnBubblePuff(rowEl, msgEl), i * 120);
      }
    }, 980);
  }

  if(userLabel === "Алексей"){
    for(let i = 0; i < 3; i++){
      setTimeout(() => {
        spawnEnergyArc(msgEl);
        spawnEnergySpark(msgEl);
      }, i * 180);
    }

    timerA = setInterval(() => {
      spawnEnergyArc(msgEl);
      if(Math.random() > .35) spawnEnergySpark(msgEl);
      if(Math.random() > .62) setTimeout(() => spawnEnergySpark(msgEl), 90);
    }, 840);

    timerB = setInterval(() => {
      if(Math.random() > .25) spawnEnergySpark(msgEl);
    }, 430);
  }

  liveTimers.set(msgEl, { timerA, timerB });
}

function renderMessages(){
  const wrap = $("chatWrap");
  stopAllLiveEffects();

  if(!Array.isArray(messagesCache) || messagesCache.length === 0){
    wrap.innerHTML = `<div class="chat-empty">Сообщений пока нет.</div>`;
    return;
  }

  wrap.innerHTML = `<div class="day-label">Сегодня</div>`;

  const fragment = document.createDocumentFragment();

  messagesCache.forEach(row => {
    const mine = currentUser && row.user === currentUser.label;
    const userClass = getUserClass(row.user);

    const line = document.createElement("div");
    line.className = `msg-row ${mine ? "mine" : "other"}`;

    const msg = document.createElement("div");
    msg.className = `msg ${mine ? "mine" : "other"} ${userClass}`;
    msg.innerHTML = `
      ${makeEffectsFor(userClass)}
      <div class="msg-head">${escapeHtml(row.user || "")}</div>
      <div class="msg-text">${escapeHtml(row.text || "")}</div>
      <div class="msg-meta">${formatTime(row.created_at)}</div>
    `;

    line.appendChild(msg);
    fragment.appendChild(line);

    if(row.user === "Анна" || row.user === "Наталия" || row.user === "Алексей"){
      requestAnimationFrame(() => startLiveEffect(line, msg, row.user));
    }
  });

  wrap.appendChild(fragment);
  wrap.scrollTop = wrap.scrollHeight;
}

function renderTasks(){
  const list = $("tasksList");

  if(!Array.isArray(tasksCache) || tasksCache.length === 0){
    list.innerHTML = `<div style="color:var(--muted);font-size:14px;">Задач пока нет.</div>`;
    return;
  }

  list.innerHTML = tasksCache.map(task => {
    const status = task.status || "new";
    const statusLabel = status === "done" ? "Выполнена" : status === "progress" ? "В работе" : "Новая";

      <div class="task-card">

        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;">
          <span style="display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;background:#f0e7e2;color:#564b46;">
            Поставил: ${escapeHtml(task.author || "")}
          </span>
          <span style="display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;background:#e6eef9;color:#324762;">

          </span>
          <span style="display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;background:#ece8f8;color:#514a8c;">

          </span>
        </div>
      </div>

async function loadMessages(){
  const { data, error } = await sb
    .from("messages")
    .select("*")
    .order("id", { ascending: true })
    .limit(300);

  if(error) throw error;

  messagesCache = Array.isArray(data) ? data : [];
  renderMessages();
}

async function loadTasks(){
  const { data, error } = await sb
    .from("tasks")
    .select("*")
    .order("id", { ascending: false })
    .limit(200);

  if(error) throw error;

  tasksCache = Array.isArray(data) ? data : [];
  renderTasks();
}
function upsertMessageLocally(row){
  if(!row || !row.id) return;

  const existsIndex = messagesCache.findIndex(item => item.id === row.id);
  if(existsIndex >= 0){
    messagesCache[existsIndex] = row;
  } else {
    messagesCache.push(row);
    messagesCache.sort((a, b) => Number(a.id) - Number(b.id));
  }

  renderMessages();
}

function removeMessageLocally(row){
  if(!row || !row.id) return;
  messagesCache = messagesCache.filter(item => item.id !== row.id);
  renderMessages();
}

function upsertTaskLocally(row){
  if(!row || !row.id) return;

  const existsIndex = tasksCache.findIndex(item => item.id === row.id);
  if(existsIndex >= 0){
    tasksCache[existsIndex] = row;
  } else {
    tasksCache.unshift(row);
  }

  tasksCache.sort((a, b) => Number(b.id) - Number(a.id));
  renderTasks();
}

function removeTaskLocally(row){
  if(!row || !row.id) return;
  tasksCache = tasksCache.filter(item => item.id !== row.id);
  renderTasks();
}

function scheduleReconnect(reason = ""){
  if(reconnectInFlight || !currentUser) return;
  clearReconnectTimer();

  setChatStatus(reason ? `переподключение: ${reason}` : "переподключение...");

  reconnectTimer = setTimeout(async () => {
    reconnectTimer = null;
    await reconnect();
  }, 1600);
}

function attachChannelStatus(channel, type){
  if(!channel) return;

  channel.subscribe((status) => {
    if(type === "messages"){
      if(status === "SUBSCRIBED"){
        setChatStatus(currentUser && currentUser.canChat ? "чат подключен" : "чат отключен для этой роли");
      }
      if(status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED"){
        scheduleReconnect("чат");
      }
    }

    if(type === "tasks"){
      if(status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED"){
        scheduleReconnect("задачи");
      }
    }
  });
}

function startMessagesRealtime(){
  if(!currentUser || !currentUser.canChat) return;

  chatChannel = sb.channel("messages-live-v10");

  chatChannel.on(
    "postgres_changes",
    { event: "INSERT", schema: "public", table: "messages" },
    payload => {
      if(payload?.new){
        upsertMessageLocally(payload.new);
      }
    }
  );

  chatChannel.on(
    "postgres_changes",
    { event: "UPDATE", schema: "public", table: "messages" },
    payload => {
      if(payload?.new){
        upsertMessageLocally(payload.new);
      }
    }
  );

  chatChannel.on(
    "postgres_changes",
    { event: "DELETE", schema: "public", table: "messages" },
    payload => {
      if(payload?.old){
        removeMessageLocally(payload.old);
      }
    }
  );

  attachChannelStatus(chatChannel, "messages");
}

function startTasksRealtime(){
  taskChannel = sb.channel("tasks-live-v10");

  taskChannel.on(
    "postgres_changes",
    { event: "INSERT", schema: "public", table: "tasks" },
    payload => {
      if(payload?.new){
        upsertTaskLocally(payload.new);
      }
    }
  );

  taskChannel.on(
    "postgres_changes",
    { event: "UPDATE", schema: "public", table: "tasks" },
    payload => {
      if(payload?.new){
        upsertTaskLocally(payload.new);
      }
    }
  );

  taskChannel.on(
    "postgres_changes",
    { event: "DELETE", schema: "public", table: "tasks" },
    payload => {
      if(payload?.old){
        removeTaskLocally(payload.old);
      }
    }
  );

  attachChannelStatus(taskChannel, "tasks");
}

async function reconnect(){
  if(reconnectInFlight || !currentUser) return;

  reconnectInFlight = true;

  try{
    await stopRealtime();

    sb = createClient();

    if(currentUser.canChat){
      await loadMessages();
      startMessagesRealtime();
      setChatStatus("чат переподключен");
    } else {
      renderNoChatState();
      setChatStatus("чат отключен для этой роли");
    }

    await loadTasks();
    startTasksRealtime();
  }catch(error){
    console.error("reconnect error", error);
    setChatStatus("ошибка переподключения");
    scheduleReconnect("повтор");
  }finally{
    reconnectInFlight = false;
  }
}

async function sendMessage(){
  if(!currentUser || !currentUser.canChat) return;

  const input = $("msgInput");
  const text = input.value.trim();
  if(!text) return;

  const tempId = "tmp_" + Date.now();
  const optimisticRow = {
    id: tempId,
    user: currentUser.label,
    text,
    created_at: new Date().toISOString()
  };

  messagesCache.push(optimisticRow);
  renderMessages();

  input.value = "";
  setChatStatus("отправка...");

  const { data, error } = await sb
    .from("messages")
    .insert({
      user: currentUser.label,
      text
    })
    .select()
    .single();

  if(error){
    console.error(error);
    messagesCache = messagesCache.filter(item => item.id !== tempId);
    renderMessages();
    input.value = text;
    setChatStatus("ошибка отправки");
    return;
  }

  messagesCache = messagesCache.filter(item => item.id !== tempId);
  if(data){
    upsertMessageLocally(data);
  } else {
    await loadMessages();
  }

  setChatStatus("сообщение отправлено");
}

async function createTask(){
  if(!currentUser || !currentUser.canCreateTasks) return;

  const title = $("taskTitle").value.trim();
  const description = $("taskDesc").value.trim();
  const assignee = $("taskAssignee").value;

  if(!title) return;

  const { data, error } = await sb
    .from("tasks")
    .insert({
      title,
      description,
      assignee,
      author: currentUser.label,
      status: "new"
    })
    .select()
    .single();

  if(error){
    console.error(error);
    return;
  }

  $("taskTitle").value = "";
  $("taskDesc").value = "";

  if(data){
    upsertTaskLocally(data);
  } else {
    await loadTasks();
  }
}

window.addEventListener("online", () => {
  if(currentUser){
    scheduleReconnect("online");
  }
});

window.addEventListener("offline", () => {
  setChatStatus("нет сети");
});

window.addEventListener("beforeunload", () => {
  stopAllLiveEffects();
});

document.addEventListener("visibilitychange", () => {
  if(document.hidden){
    stopAllLiveEffects();
  } else if(currentUser && currentUser.canChat){
    renderMessages();
  }
});

document.addEventListener("click", (e) => {
  if(e.target.id === "settingsModal"){
    closeSettings();
  }
});

$("msgInput").addEventListener("keydown", (e) => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});

(async function boot(){
  try{
    sb = createClient();
    fillTaskAssigneeOptions();

    const savedUserId = localStorage.getItem("clinic_crm_user");
    if(savedUserId && USERS[savedUserId]){
      await loginAs(savedUserId);
    } else {
      showLogin();
    }
  }catch(error){
    console.error("boot error", error);
    showLoginError("Ошибка запуска.\n" + (error?.message || "Неизвестная ошибка"));
    showLogin();
  }
})();
</script>
</body>
</html>
